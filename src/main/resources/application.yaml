spring:
  application:
    name: ziprace
  datasource:
    url: jdbc:sqlite:./data/ziprace.db?journal_mode=WAL&synchronous=NORMAL&cache_size=-64000&foreign_keys=ON
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  sql:
    init:
      mode: always

ziprace:
  queue:
    capacity: 1000
  writer:
    shutdown-timeout-ms: 5000
  upload:
    max-size-bytes: 104857600  # 100 MB
    max-entries-per-zip: 1000

server:
  tomcat:
    max-swallow-size: 100MB
    accept-count: 1024